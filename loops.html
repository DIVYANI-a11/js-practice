<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <script>
        let num = 7;
        let count =0;
        for(let i=0 ;i<10;i++){
            if(num % i == 0){
                count ++;
            }
        }
        if (count=== 2){
            console.log("prime number");

        }else{
            console.log("not prime number");
        }
    </script>
</head>
<body>
   <h2>loop</h2>
</body>
</html>
